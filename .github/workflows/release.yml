name: release

# Build binary siap-pakai untuk Windows/Linux/macOS dan lampirkan ke GitHub
# Release setiap kali ada tag `vX.Y.Z`. User cukup download dan jalankan —
# tidak perlu Rust terpasang.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            rustflags: "-C target-feature=+crt-static"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            rustflags: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            rustflags: ""
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # aws-lc-sys (dep transitif via arti-client+rustls) butuh NASM di Windows
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Build release
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --locked

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/alter${{ matrix.ext }}" "dist/alter-${{ matrix.target }}${{ matrix.ext }}"

      - name: Upload ke Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
